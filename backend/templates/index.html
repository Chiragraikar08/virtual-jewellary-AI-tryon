<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Virtual Atelier - 3D Showcase</title>

<!-- Three.js Import Map -->
<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<!-- ✅ MediaPipe AI Face Detection -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
body {
    margin: 0;
    font-family: serif;
    text-align: center;
    background: #d9ce5a;
}

#viewer-container {
    width: 95%;
    max-width: 1100px;
    height: 520px;
    margin: 20px auto;
    background: white;
    border-radius: 12px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
    overflow: hidden;
}

#viewer { width:100%; height:100%; }

.category-btn {
    padding:10px 20px;
    margin:5px;
    border:1px solid #c5c4c0;
    background:white;
    color:#333;
    cursor:pointer;
    border-radius:6px;
}

.category-btn:hover {
    background:#d4af37;
    color:white;
}

#product-gallery {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

/* ========================= */
/* TRY ON */
/* ========================= */

#tryon-container {
    display:none;
    width:600px;
    margin:20px auto;
    text-align:center;
    position:relative;
}

#webcam {
    width:100%;
    border-radius:10px;
    transform:scaleX(-1);
}

/* 3D overlay canvas */
canvas {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    border-radius:10px;
}

.view-buttons {
    margin-top:15px;
}
</style>
</head>

<body>

<h2>THE VIRTUAL ATELIER</h2>

<!-- ========================= -->
<!-- MAIN 3D VIEWER -->
<!-- ========================= -->

<div id="viewer-container">
    <div id="viewer"></div>
</div>

<!-- ❌ REMOVED left/right/top view buttons (as requested) -->

<button id="main-3d-btn" class="category-btn">3D MODELS</button>
<button id="tryon-btn" class="category-btn">3D TRY ON</button>

<div id="category-section" style="display:none;">
    <button class="category-btn" onclick="filterCategory('all')">ALL</button>
    <button class="category-btn" onclick="filterCategory('earring')">EARRINGS</button>
    <button class="category-btn" onclick="filterCategory('necklace')">NECKLACES</button>
    <button class="category-btn" onclick="filterCategory('ring')">RINGS</button>
</div>

<div id="product-gallery"></div>

<!-- ========================= -->
<!-- TRY ON AREA -->
<!-- ========================= -->

<div id="tryon-container">

    <!-- Webcam -->
    <video id="webcam" autoplay playsinline></video>

    <!-- Face Guide -->
    <div id="face-guide"
         style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
                width:250px; height:350px; border:3px dashed #d4af37;
                border-radius:50% / 60%; pointer-events:none;">
    </div>

    <div id="face-text"
         style="position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
                background:rgba(0,0,0,0.6); color:white; padding:6px 15px;
                border-radius:20px;">
        Please face FRONT for accurate 3D Try-On capture
    </div>

    <!-- Captured Image -->
    <img id="captured-photo" 
         style="width:100%; border-radius:10px; display:none;" />

    <!-- Capture Buttons -->
    <div id="capture-controls" style="margin-top:15px;">
        <button onclick="capturePhoto()" class="category-btn">CAPTURE</button>
    </div>

    <div id="retake-controls" style="margin-top:15px; display:none;">
        <button onclick="retakePhoto()" class="category-btn">RETAKE</button>
        <button onclick="downloadImage()" class="category-btn">DOWNLOAD</button>
    </div>

</div>

<!-- Three.js Logic -->
<script type="module" src="/static/viewer.js"></script>

</body>
</html>
