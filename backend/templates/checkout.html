<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Virtual Jewelry</title>
    <style>
        :root {
            --bg-dark: #02040a;
            --bg-panel: #0b0f1a;
            --gold: #d4a847;
            --gold-light: #f6db8c;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0B0;
            --border: rgba(212, 168, 71, 0.3);
            --radius-md: 12px;
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .checkout-box {
            background: var(--bg-panel);
            padding: 40px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(212, 168, 71, 0.15);
        }
        h1 {
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            margin-bottom: 24px;
        }
        .product-preview img {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        .product-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .product-price {
            font-size: 1.5rem;
            color: var(--gold-light);
            font-weight: 700;
            margin-bottom: 30px;
        }
        .btn-pay {
            background: linear-gradient(135deg, var(--gold) 0%, #b8860b 100%);
            color: #000;
            border: none;
            padding: 14px 24px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-pay:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 168, 71, 0.4);
        }
    </style>
</head>
<body>

    <div class="checkout-box">
        <h1>Secure Checkout</h1>
        <div class="product-preview">
            <img id="product-img" src="" alt="Product">
        </div>
        <div id="name" class="product-name">Loading...</div>
        <div id="price" class="product-price">...</div>
        
        <button class="btn-pay" onclick="payNow()">Pay Now</button>
    </div>

    <!-- Razorpay SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
        // Load details from localStorage
        let item = JSON.parse(localStorage.getItem("selectedProduct"));
        
        if (!item) {
            alert("No item selected for checkout! Redirecting to catalog...");
            window.location.href = "/";
        } else {
            document.getElementById("name").innerText = item.name;
            document.getElementById("price").innerText = item.price;
            if (item.image) {
                document.getElementById("product-img").src = item.image;
            } else {
                document.getElementById("product-img").style.display = 'none';
            }
        }

        // Razorpay Payment Integration
        function payNow() {
            // Clean the price string to get raw digits for backend processing
            const cleanPrice = parseInt(item.price.replace(/[^0-9]/g, ''));
            
            fetch("/create_order", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ amount: cleanPrice })
            })
            .then(res => res.json())
            .then(order => {
                var options = {
                    "key": "rzp_test_YourKeyHere123", // Matches backend placeholder
                    "amount": order.amount,
                    "currency": "INR",
                    "name": "Virtual Jewelry",
                    "description": "Purchase of " + item.name,
                    "order_id": order.id,
                    "theme": {
                        "color": "#d4a847"
                    },
                    "handler": function (response) {
                        alert("Payment Successful! Order ID: " + response.razorpay_payment_id);
                        localStorage.removeItem("selectedProduct");
                        window.location.href = "/";
                    }
                };
                var rzp = new Razorpay(options);
                rzp.open();
            })
            .catch(err => {
                console.error("Payment initiation failed:", err);
                alert("Failed to initiate payment. Please try again.");
            });
        }
    </script>
</body>
</html>
